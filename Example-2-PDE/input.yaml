%YAML 1.1
---
ANONYMOUS:
  verbosity: 0
  debug level: 0
  Mesh:
    dimension: 2
    shape: quad
    xmin: 0.0
    xmax: 1.0
    ymin: 0.0
    ymax: 1.0
    NX: 100
    NY: 100
  Physics:
    modules: porous mixed
    Dirichlet conditions:
      scalar data: true
      p:
        left: 1.0
        right: 0.0
      u:
        top: 0.0
        bottom: 0.0
    use KL expansion: true
    KL parameters:
      x-direction:
        N: 10
        eta: 0.1
        L: 1.0
        sigma: 1.0
      y-direction:
        N: 10
        eta: 0.1
        L: 1.0
        sigma: 1.0
  Functions:
    source: '0.0'
    Kinv_xx: '1.0e-2' # not actuall used
    Kinv_yy: '1.0e-2' # not actually used
  Parameters:
    KLStochcoeffs:
      type: vector
      source: scoeffs.dat
      usage: stochastic
      distribution: Gaussian
      mean: 0.0
      variance: 1.0
      #mean source: datagen_means.dat
      #variance: 0.5
  Solver:
    solver: steady-state
    workset size: -1
    nonlinear TOL: 1.0e-07
    max nonlinear iters: 2
    finaltime: 1.0
    number of steps: 10
    initial type: none
    use direct solver: true
  Discretization:
    eblock-0_0:
      order:
        p: 0
        u: 1
      quadrature: 2
  Analysis:
    analysis type: UQ
    UQ:
      samples: 10000
      seed: 123
      write samples: true
      samples input file: initial_input.dat
      samples output file: predicted_output.dat
  Postprocess:
    write solution: false
    response type: pointwise
    verification: compute errors
    compute objective: false
    compute responses: true
    Objective functions:
      objval:
        type: sensors
        sensor points file: sensor_points.dat
        save sensor data: true
        response: 'p'
        weight: 1.0
      objxvel:
        type: sensors
        sensor points file: sensor_points.dat
        save sensor data: true
        response: 'sqrt(u[x]*u[x]+u[y]*u[y])'
        weight: 1.0
...
